<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — ePIC CDB</title>
<style>
  :root {
    --accent: #4f6ef7;
    --bg: #f0f2f8;
    --surface: #ffffff;
    --border: #dde1f0;
    --text: #1e2230;
    --muted: #6b7280;
    --error-bg: #fee2e2;
    --error-fg: #991b1b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    box-shadow: 0 4px 24px rgba(30, 34, 48, 0.06);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .brand .title { font-size: 18px; font-weight: 700; color: var(--text); }
  .subtitle { font-size: 12.5px; color: var(--muted); margin-bottom: 24px; }
  .field-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
  }
  input[type="text"]:focus, input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
  }
  button {
    width: 100%;
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  button:hover { background: #3d5ce0; }
  .errors {
    background: var(--error-bg);
    color: var(--error-fg);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="#3b4fd8"/>
        <circle cx="14" cy="14" r="6" stroke="white" stroke-width="2" fill="none"/>
        <circle cx="14" cy="14" r="2" fill="white"/>
        <line x1="14" y1="4" x2="14" y2="8" stroke="white" stroke-width="1.5"/>
        <line x1="14" y1="20" x2="14" y2="24" stroke="white" stroke-width="1.5"/>
        <line x1="4" y1="14" x2="8" y2="14" stroke="white" stroke-width="1.5"/>
        <line x1="20" y1="14" x2="24" y2="14" stroke="white" stroke-width="1.5"/>
      </svg>
      <span class="title">ePIC CDB</span>
    </div>
    <div class="subtitle">Sign in to access the Component Database</div>

    {% if form.errors %}
    <div class="errors">
      {% if form.non_field_errors %}
        {{ form.non_field_errors.0 }}
      {% else %}
        Please enter a correct username and password.
      {% endif %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="field-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" autofocus required>
      </div>
      <div class="field-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
